# Local development only – do not use these credentials in production.
services:
  ignition:
    image: inductiveautomation/ignition:8.3.2
    container_name: ignition-gateway
    restart: unless-stopped
    ports:
      - "8088:8088"
      - "8043:8043"
      - "34283:34283"
    volumes:
      #- ignition-data:/usr/local/bin/ignition/data
      - ./ignition-data/projects:/usr/local/bin/ignition/data/projects
      - ./ignition-data/modules.json:/usr/local/bin/ignition/data/modules.json:ro
      - ./ignition-module/build/ignition-debugger.unsigned.modl:/usr/local/bin/ignition/user-lib/modules/ignition-debugger.unsigned.modl:ro
      - ./debugger-registry:/debugger-registry
      - ./debugger-gateway-registry:/debugger-gateway-registry
    environment:
      ACCEPT_IGNITION_EULA: "Y"
      GATEWAY_ADMIN_USERNAME: admin
      GATEWAY_ADMIN_PASSWORD: password
      IGNITION_EDITION: standard
      IGNITION_DEBUGGER_REGISTRY_DIR: /debugger-registry
      IGNITION_DEBUGGER_GATEWAY_REGISTRY_DIR: /debugger-gateway-registry
      IGNITION_DEBUGGER_PORT: 34283
      DISABLE_QUICKSTART: true
      IGNITION_UID: 2003
      IGNITION_GID: 2003
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/StatusPing"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    command: >
      -n docker-test
      --
      wrapper.java.initmemory=512
      -Dignition.allowunsignedmodules=true

volumes:
  ignition-data:
